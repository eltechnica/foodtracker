name: Deploy web app to GitHub Pages

# Builds the Expo web export and publishes it to GitHub Pages so the app is
# reachable at https://<owner>.github.io/foodtracker/ as an installable PWA.

on:
  push:
    # GitHub Pages only allows deployments from the repo's default branch. This
    # repo's default branch is the development branch below, so we watch both:
    # whichever is currently default is the one that will actually deploy.
    branches: [main, claude/health-nutrition-tracker-app-90d57o]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web (PWA)
        run: npm run build:web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
